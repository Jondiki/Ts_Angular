<h2>Races</h2>
<div class="container text-start">

<!-- // interpolation -->
 
<div class="row">
  <div class="col">
  <p>{{firstName}}</p>
  </div>
  <div class="col-3">
  <p>{{races[0].name}}</p>
  </div>
  <div class="col-1">
  <p>{{currentDate}}</p>

<!-- property binding -->

  <input type="text" [value]="firstName" class="form-control">
  <input type="text" [(ngModel)]="firstName"/>
  <button (click)="onButtonClick()">Click me!</button>
  <input [type]="inputType">
  </div>
</div>
</div>
